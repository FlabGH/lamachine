services:

  api:
    volumes:
      - ../../apps/api:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000


  frontend:
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000

  worker:
    volumes:
      - ../../apps/workers:/app
    command: python worker.py

  postgres:
    ports:
      - "5432:5432"

  qdrant:
    ports:
      - "6333:6333"

  caddy:
    volumes:
      - ../caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro