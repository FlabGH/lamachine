services:

  api:
    volumes:
      - ../../apps/api:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

  worker:
    volumes:
      - ../../apps/workers:/app
    command: python worker.py