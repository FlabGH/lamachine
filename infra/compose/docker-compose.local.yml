services:

  api:
    volumes:
      - ../../apps/api:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  worker:
    volumes:
      - ../../apps/workers:/app
    command: python worker.py

  frontend:
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --config vite.config.js"

  postgres:
    ports:
      - "55432:5432"

  qdrant:
    ports:
      - "6333:6333"

  caddy:
    volumes:
      - ../caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro

volumes:
  frontend_node_modules:
