services:
  api:
    restart: unless-stopped
#    ports:
#      - "127.0.0.1:8000:8000"

  worker:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://api:8000

  postgres:
    restart: unless-stopped
#    ports:
#      - "127.0.0.1:5432:5432"
    volumes:
      - /opt/lapythie/data/postgres:/var/lib/postgresql/data

  qdrant:
    restart: unless-stopped
#    ports:
#      - "127.0.0.1:6333:6333"
    volumes:
      - /opt/lapythie/data/qdrant:/qdrant/storage

  caddy:
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/lapythie/data/caddy_data:/data
      - /opt/lapythie/data/caddy_config:/config
