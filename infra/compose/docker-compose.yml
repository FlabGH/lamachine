services:

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - qdrant
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../../apps/frontend
    env_file:
      - ../../.env
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker:
    build:
      context: ../../apps/workers
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:16
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

#  langfuse:
#    image: langfuse/langfuse:latest
#    env_file:
#      - ../../.env
#    ports:
#      - "3001:3000"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  qdrant_data:
  caddy_data:
  caddy_config: